# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, space-separated, supports relative paths.
# This is needed so that 'app' can be imported by env.py
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for 'slug' in new revision filenames
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be written
# in 'autogenerate' mode
# Allow_empty_history = false

# version locations - list of directories where version files are located
# version_locations =

# version path separator; defaults to ';'
# version_path_separator = os

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# after generating a new revision script.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
